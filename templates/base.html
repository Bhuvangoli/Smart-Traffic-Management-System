<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Traffic Management</title>
    <!-- Modern Bootstrap Dark Theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-city text-primary me-2"></i> SmartTraffic</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/"><i class="fa-solid fa-chart-line me-1"></i> Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/add"><i class="fa-solid fa-plus-circle me-1"></i> Add Data</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/view"><i class="fa-solid fa-table me-1"></i> View Data</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/alerts"><i class="fa-solid fa-bell me-1"></i> Alerts</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 main-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show shadow-lg" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
