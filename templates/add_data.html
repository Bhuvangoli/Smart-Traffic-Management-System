{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-lg-6 col-md-8">
        <div class="card glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-block bg-primary bg-opacity-10 p-3 rounded-circle mb-3">
                    <i class="fa-solid fa-traffic-light fa-2x text-primary"></i>
                </div>
                <h2 class="fw-bold">Add Traffic Data</h2>
                <p class="text-muted small">Manually log traffic conditions for a specific signal</p>
            </div>
            
            <form method="POST" action="/add">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase tracking-wider glow-cyan">Signal ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="text" class="form-control form-control-lg custom-input" name="signal_id" required placeholder="e.g. SIG-001">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase tracking-wider glow-yellow">Vehicle Count</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fa-solid fa-car"></i></span>
                        <input type="number" class="form-control form-control-lg custom-input" name="vehicle_count" required placeholder="Number of vehicles" min="0">
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="form-label small fw-bold text-uppercase tracking-wider glow-pink">Average Speed</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fa-solid fa-gauge-high"></i></span>
                        <input type="number" class="form-control form-control-lg custom-input" name="avg_speed" required placeholder="Average speed" min="0">
                        <span class="input-group-text bg-dark border-secondary text-secondary">km/h</span>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill fw-bold shadow-lg custom-btn-hover">
                    <i class="fa-solid fa-paper-plane me-2"></i> Submit Data
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
